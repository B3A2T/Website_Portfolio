<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Cameron Jones">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <title>My Web Page</title> 
</head>
<div class="w3-container">
    <button class="w3-button w3-black" onclick="myFunction()">Dark Mode</button>    
</div>

<script>
function myFunction() {
  let x = document.body;
  x.classList.toggle("w3-black");
}
</script>


<label class="toggle toggle--pristine">
    <input class="toggle__input" type="checkbox" role="switch" value="on">
    <span class="toggle__stretch-left"></span>
    <span class="toggle__stretch-right"></span>
    <span class="toggle__sr">Switch</span>
</label>

<body>
</body>
</html>
